<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">CMC | Inicio sesion</title>
    <link rel="stylesheet" href="reg.css">
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
</head>
<body>
    <form id="form" action="">
        <img src="icon.png" alt="">
        <h1 >Iniciar Sesión</h1>
        <div class="container">
            <label for="username"><b>Usuario</b></label>
            <input autocomplete="on" id="username" class="in" type="text" placeholder="Ingrese su usuario" name="username" required>
            
            <label for="pass"><b>Contraseña</b></label>
            <div class="pass">
                <input autocomplete="off"  id="pass" class="in" type="password" placeholder="Ingrese su contraseña" name="pass" required>
                <button title="ve" id="ve" type="button" onclick="mc()"><i id="vi"  class="fa-solid fa-eye"></i></button>
                
            </div>
            <button  class="btn" type="submit">Iniciar sesión</button>
            
             <br>
             <br>
            <section>
                <span class="psw"><a onclick="change()">¿No tienes cuenta? Registrate ya</a></span>
                <span class="psw"><a>¿Olvidaste tu contraseña?</a></span>
            </section>
            <br>    
        </div>	    
    </form>

    <script src="/js/login.js" charset="UTF-8"></script>
    <script text src="https://kit.fontawesome.com/90ac4b5e66.js"  crossorigin="anonymous"></script>
</body>
</html>
